set -g mouse on
set -g history-limit 100000
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION DISPLAY"

# TMUX Plugin Manager Configuration (https://github.com/tmux-plugins/tpm)
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# Press Prefix + capital I to install plugins
# Press Prefix + capital U to update plugins
# Press Prefix + alt + r to restore sessions (if using tmux-resurrect)

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
